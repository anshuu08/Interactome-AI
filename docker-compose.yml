version: "3.9"

services:
  # ── Backend (FastAPI + ML) ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend (Next.js) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - POSTGRES_USER=interactome
      - POSTGRES_PASSWORD=securepassword
      - POSTGRES_DB=interactome_db
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
  # ── Database (PostgreSQL) ───────────────────────
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=interactome
      - POSTGRES_PASSWORD=securepassword
      - POSTGRES_DB=interactome_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "interactome"]
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
